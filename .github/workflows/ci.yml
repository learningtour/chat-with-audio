name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"
      # Base sync builds the C++ DSP core (scikit-build-core + pybind11);
      # the heavy AI extras (torch, DeepFilterNet, Demucs) are not needed
      # for the test suite, which falls back gracefully.
      - name: Install
        run: uv sync
      - name: Lint
        run: uv run ruff check .
      - name: Tests
        run: uv run pytest -q
